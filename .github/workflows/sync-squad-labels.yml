name: Sync Squad Labels

on:
  push:
    paths:
      - '.squad/team.md'
      - '.github/workflows/sync-squad-labels.yml'
  workflow_dispatch:

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Parse roster and sync labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const teamFile = '.squad/team.md';

            if (!fs.existsSync(teamFile)) {
              core.info('No .squad/team.md found — skipping label sync');
              return;
            }

            const content = fs.readFileSync(teamFile, 'utf8');
            const lines = content.split('\n');

            // Parse agent names from the Agents table
            const agents = [];
            let inAgentsTable = false;
            for (const line of lines) {
              if (line.match(/^##\s+Agents/i)) {
                inAgentsTable = true;
                continue;
              }
              if (inAgentsTable && line.startsWith('## ')) break;
              if (inAgentsTable && line.startsWith('|') && !line.includes('---') && !line.includes('Agent')) {
                const cells = line.split('|').map(c => c.trim()).filter(Boolean);
                if (cells.length >= 3) {
                  const name = cells[0].replace(/\*\*/g, '');
                  const role = cells[1];
                  agents.push({ name, role });
                }
              }
            }

            core.info(`Found ${agents.length} agents: ${agents.map(a => a.name).join(', ')}`);

            const SQUAD_COLOR = '9B8FCC';
            const MEMBER_COLOR = '9B8FCC';
            const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');

            const labels = [
              { name: 'squad', color: SQUAD_COLOR, description: 'Squad triage inbox — PO will assign' },
            ];

            for (const agent of agents) {
              labels.push({
                name: `squad:${normalize(agent.name)}`,
                color: MEMBER_COLOR,
                description: `Assigned to ${agent.name} (${agent.role})`
              });
            }

            // Product labels
            const PRODUCT_COLOR = '1D76DB';
            const products = ['deck-engine', 'deck-launcher', 'deck-saas-core', 'deck-gateway'];
            for (const product of products) {
              labels.push({
                name: `product:${product}`,
                color: PRODUCT_COLOR,
                description: `Affects ${product}`
              });
            }

            // Go/No-go labels
            labels.push(
              { name: 'go:yes', color: '0E8A16', description: 'Approved — ready to implement' },
              { name: 'go:no', color: 'B60205', description: 'Not pursuing' },
              { name: 'go:needs-research', color: 'FBCA04', description: 'Needs investigation first' }
            );

            // Type labels
            labels.push(
              { name: 'type:feature', color: 'DDD1F2', description: 'New capability' },
              { name: 'type:bug', color: 'FF0422', description: 'Something broken' },
              { name: 'type:docs', color: 'D4E5F7', description: 'Documentation' },
              { name: 'type:chore', color: 'D4E5F7', description: 'Maintenance, refactoring' }
            );

            // Priority labels
            labels.push(
              { name: 'priority:p0', color: 'B60205', description: 'Blocking release' },
              { name: 'priority:p1', color: 'D93F0B', description: 'This sprint' },
              { name: 'priority:p2', color: 'FBCA04', description: 'Next sprint' }
            );

            // Sync all labels
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated: ${label.name}`);
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  core.info(`Created: ${label.name}`);
                }
              }
            }

            core.info(`Label sync complete: ${labels.length} labels`);
