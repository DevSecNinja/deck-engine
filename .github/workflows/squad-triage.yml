name: Squad Triage

on:
  issues:
    types: [labeled]

jobs:
  triage:
    if: github.event.label.name == 'squad'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Triage issue to product PO
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const issueText = `${issue.title}\n${issue.body || ''}`.toLowerCase();

            // Product → PO mapping (matches .squad/team.md)
            const PRODUCT_PO = {
              'deck-engine':    { po: 'Messi',   doer: 'De Paul' },
              'deck-launcher':  { po: 'Julian',  doer: 'De Paul' },
              'deck-saas-core': { po: 'Enzo',    doer: 'Lautaro' },
              'deck-gateway':   { po: 'Cuti',    doer: 'Licha' },
            };

            // Keyword → product detection
            const PRODUCT_KEYWORDS = {
              'deck-engine':    ['slide', 'theme', 'component', 'scaffolder', 'create-deckio', 'vitest', 'deck-engine', 'jsx', 'vite plugin'],
              'deck-launcher':  ['launcher', 'project picker', 'workspace', 'preview', 'copilot sdk', 'server-plugin', 'deck-launcher', 'import'],
              'deck-saas-core': ['kubernetes', 'k8s', 'docker', 'dockerfile', 'bicep', 'aks', 'acr', 'kustomize', 'deploy', 'container', 'infrastructure', 'deck-saas'],
              'deck-gateway':   ['gateway', 'oauth', 'auth', 'session', 'login', 'handoff', 'proxy', 'namespace provisioning', 'caddy', 'tls'],
            };

            // Detect product from issue body (form dropdown or keywords)
            let detectedProduct = null;

            // Check form dropdown value first
            for (const product of Object.keys(PRODUCT_PO)) {
              if (issueText.includes(`### product\n\n${product}`) || issueText.includes(`product: ${product}`)) {
                detectedProduct = product;
                break;
              }
            }

            // Fall back to keyword matching
            if (!detectedProduct) {
              let bestScore = 0;
              for (const [product, keywords] of Object.entries(PRODUCT_KEYWORDS)) {
                const score = keywords.filter(kw => issueText.includes(kw)).length;
                if (score > bestScore) {
                  bestScore = score;
                  detectedProduct = product;
                }
              }
            }

            const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (detectedProduct) {
              const { po, doer } = PRODUCT_PO[detectedProduct];
              const poLabel = `squad:${normalize(po)}`;

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [poLabel, `product:${detectedProduct}`, 'go:needs-research']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### ⚽ Squad Triage`,
                  '',
                  `**Product:** ${detectedProduct}`,
                  `**Assigned to:** ${po} (Product Owner)`,
                  `**Doer:** ${doer}`,
                  '',
                  `${po} will review, define acceptance criteria, and decide go/no-go.`,
                  `When ready, ${po} applies \`go:yes\` and assigns to ${doer} via \`squad:${normalize(doer)}\`.`,
                  '',
                  '---',
                  '',
                  '**Squad members:**',
                  ...Object.entries(PRODUCT_PO).map(([prod, { po: p, doer: d }]) =>
                    `- **${p}** (PO ${prod}) · **${d}** (doer) → \`squad:${normalize(p)}\` / \`squad:${normalize(d)}\``
                  ),
                  `- **Licha** (Security) → \`squad:licha\``,
                  '',
                  '> To reassign: remove the current `squad:*` label and add the correct one.',
                ].join('\n')
              });

              core.info(`Triaged #${issue.number} → ${po} (${detectedProduct})`);
            } else {
              // No product detected — leave for manual triage
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### ⚽ Squad Triage`,
                  '',
                  `Could not auto-detect the target product.`,
                  `A PO should add the appropriate \`product:*\` and \`squad:*\` labels.`,
                ].join('\n')
              });

              core.info(`Could not auto-triage #${issue.number} — needs manual assignment`);
            }
